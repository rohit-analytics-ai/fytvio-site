<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of service — Fytvio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #00C896;
    --teal-light: #E1F5EE;
    --text: #1A1F36;
    --text-2: #4B5563;
    --text-3: #9CA3AF;
    --border: #E5E7EB;
    --surface: #F9FAFB;
    --white: #FFFFFF;
    --radius: 10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--white);
    color: var(--text);
    font-size: 16px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }

    nav {
      background: #0B1020; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-brand {
      font-size: 18px; font-weight: 600; color: #fff;
      text-decoration: none; letter-spacing: -0.02em;
    }
    .nav-brand span { color: #00C896; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a {
      font-size: 13px; color: rgba(255,255,255,0.5); text-decoration: none;
      letter-spacing: 0.03em; transition: color 0.2s;
    }
    .nav-links a:hover { color: rgba(255,255,255,0.9); }
    .nav-links a.active { color: #00C896 !important; }

  .page-wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  .hero {
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .doc-badge {
    display: inline-block;
    background: var(--teal-light);
    color: #0F6E56;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }
  .hero h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 0.75rem;
    line-height: 1.2;
  }
  .hero p { font-size: 16px; color: var(--text-2); }
  .meta {
    display: flex;
    gap: 2rem;
    margin-top: 1.25rem;
    font-size: 13px;
    color: var(--text-3);
  }
  .meta strong { color: var(--text-2); }

  .toc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 3rem;
  }
  .toc-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-3);
    margin-bottom: 0.75rem;
  }
  .toc ol {
    list-style: decimal;
    padding-left: 1.25rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 2rem;
  }
  .toc ol li a { font-size: 14px; color: var(--text-2); text-decoration: none; }
  .toc ol li a:hover { color: var(--teal); }

  .section { margin-bottom: 3rem; scroll-margin-top: 80px; }
  .section-num {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--teal);
    margin-bottom: 0.4rem;
  }
  h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  h3 { font-size: 16px; font-weight: 600; color: var(--text); margin: 1.5rem 0 0.5rem; }
  p { margin-bottom: 1rem; color: var(--text-2); }
  p:last-child { margin-bottom: 0; }
  ul, ol { padding-left: 1.5rem; margin-bottom: 1rem; color: var(--text-2); }
  li { margin-bottom: 0.35rem; }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin: 1.25rem 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .data-table th {
    background: var(--surface);
    padding: 10px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-3);
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 10px 14px;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface); }

  .callout {
    display: flex;
    gap: 12px;
    background: #FEF9EC;
    border-left: 3px solid #BA7517;
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 1rem 1.25rem;
    margin: 1.5rem 0;
  }
  .callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .callout p { margin: 0; font-size: 14px; color: #854F0B; }

  .callout.info {
    background: var(--teal-light);
    border-left-color: var(--teal);
  }
  .callout.info p { color: #0F6E56; }

  hr { border: none; border-top: 1px solid var(--border); margin: 3rem 0; }

  .contact-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-top: 1.25rem;
  }
  .contact-card p { margin-bottom: 0.5rem; font-size: 14px; }
  .contact-card a { color: var(--teal); text-decoration: none; }
  .contact-card a:hover { text-decoration: underline; }

  .plan-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 1.25rem 0;
  }
  .plan-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  .plan-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .plan-price { font-size: 20px; font-weight: 700; color: var(--teal); }
  .plan-price span { font-size: 13px; font-weight: 400; color: var(--text-3); }
  .plan-detail { font-size: 12px; color: var(--text-3); margin-top: 6px; }

  footer {
    background: #0B1020; text-align: center; padding: 32px 24px;
  }
  .footer-links {
    display: flex; flex-wrap: wrap; gap: 6px 24px;
    justify-content: center; margin-bottom: 14px;
  }
  .footer-links a {
    color: rgba(255,255,255,0.35); text-decoration: none;
    font-size: 13px; transition: color 0.2s;
  }
  .footer-links a:hover { color: rgba(255,255,255,0.7); }
  .footer-copy { font-size: 12px; color: rgba(255,255,255,0.2); }

  @media (max-width: 600px) {
    .toc ol { grid-template-columns: 1fr; }
    .hero h1 { font-size: 26px; }
    .meta { flex-direction: column; gap: 0.25rem; }
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
    .page-wrap { padding: 2rem 1rem 4rem; }
    .plan-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">fyt<span>vio</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/terms.html" class="active">Terms</a>
    <a href="/privacy.html">Privacy</a>
  </div>
</nav>
